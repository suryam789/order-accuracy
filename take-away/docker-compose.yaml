version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: oa_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      NO_PROXY: "localhost,127.0.0.1,order-accuracy,minio,ovms-vlm,host.docker.internal"
      no_proxy: "localhost,127.0.0.1,order-accuracy,minio,ovms-vlm,host.docker.internal"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - order-accuracy-net

  # OVMS VLM service
  ovms-vlm:
    image: openvino/model_server:latest-gpu
    container_name: oa_ovms_vlm
    ports:
      - "8001:8000"
    volumes:
      - ${OVMS_MODELS_DIR:-../ovms-service/models}:/models:ro
      - ${OVMS_CACHE_DIR:-../ovms-service/cache}:/tmp/ov_cache
    environment:
      - OV_CACHE_DIR=/tmp/ov_cache
    command:
      - --rest_port=8000
      - --config_path=/models/config.json
      - --log_level=INFO
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"
    restart: unless-stopped
    healthcheck:
      # Check that model is AVAILABLE, not just that HTTP server is up
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/config | grep -q AVAILABLE"]
      interval: 10s
      timeout: 10s
      retries: 100
      start_period: 45s
    networks:
      - order-accuracy-net

  # Unified Order Accuracy Service
  # SINGLE Station (per-container): docker compose up -d --scale order-accuracy=4
  # MULTI Station (multi-process in one container): Set SERVICE_MODE=parallel
  order-accuracy:
    image: intel/order-accuracy-take-away:2026.0.0
    build:
      context: .
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${HTTP_PROXY}
        - https_proxy=${HTTPS_PROXY}
        - no_proxy=${NO_PROXY}
    container_name: oa_service  # Single container name for parallel mode
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"
    volumes:
      - ${VIDEOS_DIR:-./storage/videos}:/videos
      - ${UPLOADS_DIR:-./storage/uploads}:/uploads
      - ${RESULTS_DIR:-./results}:/results
      - ${MODELS_DIR:-./models}:/models
      - ${MODELS_DIR:-./models}:/model
      - ${CONFIG_DIR:-./config}:/config:ro
      - ${DATASETS_DIR:-./datasets}:/datasets:ro
      - ./src:/app:ro  # Mount src for live code changes (read-only)
      - pipeline_sync:/sync  # Shared sync volume for pipeline readiness signals
    environment:
      # Service mode configuration
      SERVICE_MODE: ${SERVICE_MODE:-single}
      WORKERS: ${WORKERS:-0}
      VLM_WORKERS: ${VLM_WORKERS:-2}
      SCALING_MODE: ${SCALING_MODE:-fixed}
      # Pipeline synchronization directory
      PIPELINE_SYNC_DIR: /sync/ready
      # When the external oa_frame_selector service is running it owns frame
      # selection and VLM calls. Station worker skips its own duplicate path.
      EXTERNAL_FRAME_SELECTOR: ${EXTERNAL_FRAME_SELECTOR:-true}
      
      # Common configuration
      APP_CONFIG: /config/application.yaml
      
      # VLM Backend (embedded or ovms)
      VLM_BACKEND: ${VLM_BACKEND:-ovms}
      VLM_MODEL_PATH: ${VLM_MODEL_PATH:-/model/Qwen2.5-VL-7B-Instruct}
      OPENVINO_DEVICE: ${TARGET_DEVICE:-GPU}
      
      # OVMS settings (when VLM_BACKEND=ovms)
      OVMS_ENDPOINT: ${OVMS_ENDPOINT:-http://ovms-vlm:8000}
      OVMS_MODEL_NAME: ${OVMS_MODEL_NAME:-Qwen/Qwen2.5-VL-7B-Instruct}
      VLM_PRECISION: ${VLM_PRECISION:-int8}
      VLM_DEVICE: ${TARGET_DEVICE:-GPU}
      OVMS_TIMEOUT: ${OVMS_TIMEOUT:-120}
      
      # Semantic service
      SEMANTIC_SERVICE_ENDPOINT: ${SEMANTIC_SERVICE_ENDPOINT:-http://semantic-service:8080}
      USE_SEMANTIC_SERVICE: ${USE_SEMANTIC_SERVICE:-true}
      
      # RTSP Streamer
      RTSP_STREAMER_HOST: ${RTSP_STREAMER_HOST:-rtsp-streamer}
      RTSP_STREAMER_PORT: ${RTSP_STREAMER_PORT:-8554}
      RTSP_STREAMS: ${RTSP_STREAMS:-}
      RTSP_STREAM_NAME: ${RTSP_STREAM_NAME:-test}
      

      
      # GStreamer capture settings
      CAPTURE_FPS: ${CAPTURE_FPS:-10}  # Frames per second for pipeline (10fps)
      
      # Frame pipeline tuning (order 384 fix: OCR models take ~30s to load)
      # Pre-buffer must hold frames until OCR is ready to detect orders
      PRE_BUFFER_FRAMES: ${PRE_BUFFER_FRAMES:-300}  # Frames to hold in buffer (300 @ 10fps = 30s)
      OCR_WARMUP_FRAMES: ${OCR_WARMUP_FRAMES:-2}    # Frames to wait before OCR ready signal (reduced for faster startup)
      
      # Performance tuning
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-4}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-4}
      
      # Metrics logging
      CONTAINER_RESULTS_PATH: ${CONTAINER_RESULTS_PATH:-/results}
      USECASE_1: ${USECASE_1:-take-away-order-accuracy}

      # Order Recall - path where frame-selector writes debug frames
      FRAME_SELECTOR_DEBUG_DIR: ${FRAME_SELECTOR_DEBUG_DIR:-/results/frame-selector-in}
      # Playback FPS for stitched recall replay video
      RECALL_REPLAY_FPS: ${RECALL_REPLAY_FPS:-10}
      
      # RabbitMQ disabled for simplicity (direct HTTP calls used)
      USE_RABBITMQ: ${USE_RABBITMQ:-false}
      
      # Fix for DLStreamer gvapython Python symbol conflicts
      LD_PRELOAD: /lib/x86_64-linux-gnu/libpython3.10.so.1.0
      
      # Network - append service names to host's NO_PROXY
      NO_PROXY: "${NO_PROXY},order-accuracy,minio,ovms-vlm,semantic-service,rtsp-streamer,host.docker.internal"
      no_proxy: "${no_proxy},order-accuracy,minio,ovms-vlm,semantic-service,rtsp-streamer,host.docker.internal"
    # ports: Commented out to enable multi-station scaling
    # For single station: use Gradio UI at port 7860
    # For access to specific station: docker port <container_name> 8000
    ports:
      - "8000:8000"  # Exposed for monitoring/API access
    depends_on:
      minio:
        condition: service_healthy
      ovms-vlm:
        condition: service_healthy
      semantic-service:
        condition: service_healthy
      frame-selector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 100
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cpus: 4
    shm_size: 2g
    networks:
      - order-accuracy-net

  frame-selector:
    image: intel/order-accuracy-frame-selector:2026.0.0
    build:
      context: ./frame-selector-service
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${HTTP_PROXY}
        - https_proxy=${HTTPS_PROXY}
        - no_proxy=${NO_PROXY}
    container_name: oa_frame_selector
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - ${CONFIG_DIR:-./config}:/config:ro
      - ${MODELS_DIR:-./models}:/app/models
      - ${DATASETS_DIR:-./datasets}:/app/datasets
      - ${RESULTS_DIR:-./results}/frame-selector-in:/app/debug/frame-selector-in  # Debug frames for Order Recall
    environment:
      # Multi-station mode: single instance handles all stations
      MULTI_STATION_MODE: "true"
      WORKERS: ${WORKERS:-1}
      # Debug frame saving
      DEBUG_FRAMES_ENABLED: ${DEBUG_FRAMES_ENABLED:-true}
      # Clean up stale frames from MinIO on startup (ensures fresh start for benchmarking)
      CLEANUP_ON_STARTUP: ${CLEANUP_ON_STARTUP:-true}
      # Legacy single-station config (ignored when MULTI_STATION_MODE=true)
      STATION_ID: ${STATION_ID:-station_1}
      APP_CONFIG: /config/application.yaml
      # RabbitMQ disabled for simplicity (direct HTTP calls used)
      USE_RABBITMQ: "false"
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      http_proxy: ${HTTP_PROXY}
      https_proxy: ${HTTPS_PROXY}
      NO_PROXY: "localhost,127.0.0.1,order-accuracy,oa_service,minio,ovms-vlm,host.docker.internal"
      no_proxy: "localhost,127.0.0.1,order-accuracy,oa_service,minio,ovms-vlm,host.docker.internal"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - order-accuracy-net

  gradio-ui:
    image: intel/order-accuracy-take-away-ui:2026.0.0
    build:
      context: ./gradio-ui
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${HTTP_PROXY}
        - https_proxy=${HTTPS_PROXY}
        - no_proxy=${NO_PROXY}
    container_name: oa_gradio
    ports:
      - "7860:7860"
    depends_on:
      - order-accuracy
    environment:
      NO_PROXY: "localhost,127.0.0.1,order-accuracy,oa_service,minio,ovms-vlm,oa_ovms_vlm,semantic-service,oa_semantic_service,frame-selector,oa_frame_selector,host.docker.internal"
      no_proxy: "localhost,127.0.0.1,order-accuracy,oa_service,minio,ovms-vlm,oa_ovms_vlm,semantic-service,oa_semantic_service,frame-selector,oa_frame_selector,host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - order-accuracy-net

  # Semantic Comparison Service
  semantic-service:
    image: intel/semantic-search-agent:2026.0.0
    container_name: oa_semantic_service
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config:ro
      - ${MODELS_DIR:-./models}:/models:ro  # For OpenVINO mode
    devices:
      - /dev/dri:/dev/dri  # GPU access for OpenVINO
    group_add:
      - video
      - "992"
    environment:
      # App settings
      - APP_NAME=semantic-search-agent
      - LOG_LEVEL=${SEMANTIC_LOG_LEVEL:-INFO}
      # Matching configuration
      - DEFAULT_MATCHING_STRATEGY=${DEFAULT_MATCHING_STRATEGY:-hybrid}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.85}
      # VLM Backend: 'ovms' or 'openvino'
      - VLM_BACKEND=${SEMANTIC_VLM_BACKEND:-ovms}
      # OVMS settings (when VLM_BACKEND=ovms)
      - OVMS_ENDPOINT=http://ovms-vlm:8000
      - OVMS_MODEL_NAME=${OVMS_MODEL_NAME:-Qwen/Qwen2.5-VL-7B-Instruct}
      - VLM_PRECISION=${VLM_PRECISION:-int8}
      - VLM_DEVICE=${TARGET_DEVICE:-GPU}
      - OVMS_TIMEOUT=${OVMS_TIMEOUT:-60}
      # OpenVINO settings (when VLM_BACKEND=openvino)
      - OPENVINO_MODEL_PATH=${OPENVINO_MODEL_PATH:-/models/Qwen2.5-VL-7B-Instruct}
      - OPENVINO_DEVICE=${TARGET_DEVICE:-GPU}
      # Cache settings
      - CACHE_ENABLED=true
      - CACHE_BACKEND=memory
      - CACHE_TTL=${CACHE_TTL:-3600}
      # Proxy settings
      - NO_PROXY=localhost,127.0.0.1,order-accuracy,minio,ovms-vlm,semantic-service,host.docker.internal
      - no_proxy=localhost,127.0.0.1,order-accuracy,minio,ovms-vlm,semantic-service,host.docker.internal
    depends_on:
      ovms-vlm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - order-accuracy-net

  # RTSP Streamer - Converts video files to RTSP streams
  # Starts AFTER order-accuracy and frame-selector are healthy to ensure pipelines are ready
  rtsp-streamer:
    image: intel/order-accuracy-take-away-rtsp:2026.0.0
    build:
      context: ./rtsp-streamer
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${HTTP_PROXY}
        - https_proxy=${HTTPS_PROXY}
        - no_proxy=${NO_PROXY}
    container_name: oa_rtsp_streamer
    profiles:
      - parallel
      - benchmark
    depends_on:
      order-accuracy:
        condition: service_healthy
      frame-selector:
        condition: service_healthy
    volumes:
      - ${VIDEOS_DIR:-./storage/videos}:/media:ro  # Mount videos as read-only
      - pipeline_sync:/sync  # Shared sync volume for pipeline readiness signals
    environment:
      - MEDIA_DIR=/media
      - RTSP_PORT=8554
      - RTSP_STREAMER_HOST=rtsp-streamer
      - RTSP_STREAMER_PORT=8554
      # Stream configuration - read from .env
      - WORKERS=${WORKERS:-1}
      - RTSP_STREAM_NAME=${RTSP_STREAM_NAME:-test}
      - RTSP_STREAMS=${RTSP_STREAMS:-}
      # Loop configuration: -1=infinite, 1=once, 2=twice, etc.
      - LOOP_COUNT=${LOOP_COUNT:-1}
      # Seconds of black frames BEFORE each loop (except first) - gives pipeline reset time
      # Needs to be longer than VLM inference time (~15s) to ensure clean state reset
      - LOOP_WARMUP=${LOOP_WARMUP:-2}
      # Pipeline synchronization: signal=wait for ready files, delay=legacy timer, none=immediate
      - SYNC_MODE=${SYNC_MODE:-signal}
      - SYNC_DIR=/sync/ready
      - SYNC_TIMEOUT=${SYNC_TIMEOUT:-120}
      - STARTUP_DELAY=${STARTUP_DELAY:-10}  # Fallback delay if SYNC_MODE=delay
    ports:
      - "8554:8554"  # RTSP port
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8554"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 0s
    networks:
      - order-accuracy-net

  metrics-collector:
    image: intel/retail-benchmark:2026.0.0
    container_name: metrics-collector
    profiles:
      - benchmark
      - parallel
    privileged: true
    pid: host
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
      - NPU_LOG=/tmp/results/npu_usage.csv
      - METRICS_DIR=/tmp/results
    volumes:
      - ${RESULTS_DIR:-./results}:/tmp/results
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /sys/devices:/sys/devices
      - /dev/dri:/dev/dri:rw
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
    devices:
      - "/sys:/sys"
      - "/dev:/dev"
      - "/run:/run"
      - "/proc:/proc"
    networks:
      - order-accuracy-net

networks:
  order-accuracy-net:
    driver: bridge

volumes:
  minio_data:
  pipeline_sync:  # Shared volume for RTSP/GStreamer pipeline synchronization
